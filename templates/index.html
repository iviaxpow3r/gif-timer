<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Timer Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkerboard {
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-8">GIF Timer Generator</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Controls -->
            <div class="space-y-6">

                <!-- Duration -->
                <div class="bg-gray-800 rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Duration</h2>
                    <div class="flex gap-4 items-center">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Minutes</label>
                            <input type="number" id="minutes" value="1" min="0" max="60"
                                class="w-20 bg-gray-700 rounded px-3 py-2 text-center">
                        </div>
                        <span class="text-2xl mt-5">:</span>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Seconds</label>
                            <input type="number" id="seconds" value="0" min="0" max="59"
                                class="w-20 bg-gray-700 rounded px-3 py-2 text-center">
                        </div>
                    </div>
                </div>

                <!-- Style -->
                <div class="bg-gray-800 rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Style</h2>
                    <div class="flex gap-3">
                        <button onclick="setStyle('digital')" id="btn-digital"
                            class="flex-1 py-2 px-4 rounded font-medium bg-blue-600">Digital</button>
                        <button onclick="setStyle('circular')" id="btn-circular"
                            class="flex-1 py-2 px-4 rounded font-medium bg-gray-700 hover:bg-gray-600">Circular</button>
                    </div>
                </div>

                <!-- Negative Time -->
                <div class="bg-gray-800 rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Negative Time</h2>
                    <label class="flex items-center gap-2 mb-3 cursor-pointer">
                        <input type="checkbox" id="go-negative" class="w-4 h-4" onchange="toggleNegative()">
                        <span>Continue counting past zero</span>
                    </label>
                    <div id="negative-options" class="hidden space-y-3 pl-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="infinite" class="w-4 h-4" onchange="toggleInfinite()">
                            <span>Loop forever</span>
                        </label>
                        <div id="neg-duration-row" class="flex items-center gap-2">
                            <label class="text-sm text-gray-400">Negative seconds:</label>
                            <input type="number" id="negative-duration" value="10" min="1" max="300"
                                class="w-20 bg-gray-700 rounded px-3 py-2 text-center">
                        </div>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="flash-negative" checked class="w-4 h-4">
                            <span>Flash when negative</span>
                        </label>
                    </div>
                </div>

                <!-- Colors -->
                <div class="bg-gray-800 rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Colors</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Background</label>
                            <div class="flex items-center gap-2">
                                <input type="color" id="bg-color" value="#000000"
                                    class="w-10 h-10 rounded cursor-pointer bg-transparent">
                                <label class="flex items-center gap-1 text-sm cursor-pointer">
                                    <input type="checkbox" id="bg-transparent" class="w-3 h-3">
                                    Transparent
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Text</label>
                            <input type="color" id="fg-color" value="#FFFFFF"
                                class="w-10 h-10 rounded cursor-pointer bg-transparent">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Negative Text</label>
                            <input type="color" id="negative-color" value="#FF3333"
                                class="w-10 h-10 rounded cursor-pointer bg-transparent">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Flash Color</label>
                            <div class="flex items-center gap-2">
                                <input type="color" id="flash-color" value="#000000"
                                    class="w-10 h-10 rounded cursor-pointer bg-transparent">
                                <label class="flex items-center gap-1 text-sm cursor-pointer">
                                    <input type="checkbox" id="flash-transparent" checked class="w-3 h-3">
                                    Transparent
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Circular-specific colors -->
                    <div id="ring-colors" class="hidden mt-3 pt-3 border-t border-gray-700">
                        <h3 class="text-sm font-medium text-gray-300 mb-2">Ring Colors</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Remaining</label>
                                <input type="color" id="ring-fg-color" value="#00CC66"
                                    class="w-10 h-10 rounded cursor-pointer bg-transparent">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Depleted</label>
                                <input type="color" id="ring-bg-color" value="#333333"
                                    class="w-10 h-10 rounded cursor-pointer bg-transparent">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Font & Size -->
                <div class="bg-gray-800 rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Font & Size</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Font</label>
                            <select id="font-select" class="w-full bg-gray-700 rounded px-3 py-2">
                                <option value="">Auto (system default)</option>
                                {% for name, path in fonts.items() %}
                                <option value="{{ path }}">{{ name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">Font Size</label>
                                <input type="number" id="font-size" placeholder="Auto" min="10" max="500"
                                    class="w-full bg-gray-700 rounded px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">GIF Size</label>
                                <div class="flex items-center gap-1">
                                    <input type="number" id="gif-width" value="400" min="100" max="2000"
                                        class="w-20 bg-gray-700 rounded px-2 py-2 text-center">
                                    <span class="text-gray-400">x</span>
                                    <input type="number" id="gif-height" value="400" min="100" max="2000"
                                        class="w-20 bg-gray-700 rounded px-2 py-2 text-center">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Generate Button -->
                <button onclick="generateTimer()" id="generate-btn"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold text-lg transition">
                    Generate Timer GIF
                </button>
            </div>

            <!-- Preview -->
            <div class="space-y-4">
                <div class="bg-gray-800 rounded-lg p-4">
                    <h2 class="text-lg font-semibold mb-3">Preview</h2>
                    <div id="preview-area"
                        class="checkerboard rounded-lg flex items-center justify-center min-h-[400px]">
                        <p id="placeholder" class="text-gray-500 text-lg">Click "Generate" to preview</p>
                        <img id="preview-img" class="hidden max-w-full rounded" alt="Timer preview">
                    </div>
                </div>
                <div id="download-section" class="hidden">
                    <a id="download-link" download="timer.gif"
                        class="block w-full py-3 bg-green-600 hover:bg-green-700 rounded-lg font-semibold text-lg text-center transition">
                        Download GIF
                    </a>
                    <p id="file-info" class="text-sm text-gray-400 mt-2 text-center"></p>
                </div>
                <div id="loading" class="hidden text-center py-8">
                    <div class="inline-block w-8 h-8 border-4 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-2 text-gray-400">Generating timer...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentStyle = 'digital';
        let currentBlobUrl = null;

        function setStyle(style) {
            currentStyle = style;
            document.getElementById('btn-digital').className =
                `flex-1 py-2 px-4 rounded font-medium ${style === 'digital' ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}`;
            document.getElementById('btn-circular').className =
                `flex-1 py-2 px-4 rounded font-medium ${style === 'circular' ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}`;
            document.getElementById('ring-colors').classList.toggle('hidden', style !== 'circular');
        }

        function toggleNegative() {
            const checked = document.getElementById('go-negative').checked;
            document.getElementById('negative-options').classList.toggle('hidden', !checked);
        }

        function toggleInfinite() {
            const checked = document.getElementById('infinite').checked;
            document.getElementById('neg-duration-row').classList.toggle('hidden', checked);
        }

        async function generateTimer() {
            const btn = document.getElementById('generate-btn');
            const loading = document.getElementById('loading');
            const previewImg = document.getElementById('preview-img');
            const placeholder = document.getElementById('placeholder');
            const downloadSection = document.getElementById('download-section');

            btn.disabled = true;
            btn.textContent = 'Generating...';
            btn.classList.add('opacity-50');
            loading.classList.remove('hidden');
            previewImg.classList.add('hidden');
            placeholder.classList.add('hidden');
            downloadSection.classList.add('hidden');

            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;
            const duration = minutes * 60 + seconds;

            const data = {
                duration: duration,
                style: currentStyle,
                width: parseInt(document.getElementById('gif-width').value) || 400,
                height: parseInt(document.getElementById('gif-height').value) || 400,
                bg_color: document.getElementById('bg-color').value,
                bg_transparent: document.getElementById('bg-transparent').checked,
                fg_color: document.getElementById('fg-color').value,
                negative_color: document.getElementById('negative-color').value,
                ring_bg_color: document.getElementById('ring-bg-color').value,
                ring_fg_color: document.getElementById('ring-fg-color').value,
                go_negative: document.getElementById('go-negative').checked,
                infinite: document.getElementById('infinite').checked,
                negative_duration: parseInt(document.getElementById('negative-duration').value) || 10,
                flash_on_negative: document.getElementById('flash-negative').checked,
                flash_color: document.getElementById('flash-color').value,
                flash_transparent: document.getElementById('flash-transparent').checked,
                font_path: document.getElementById('font-select').value || null,
                font_size: document.getElementById('font-size').value || null,
            };

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (!response.ok) throw new Error('Generation failed');

                const blob = await response.blob();
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = URL.createObjectURL(blob);

                previewImg.src = currentBlobUrl;
                previewImg.classList.remove('hidden');

                const downloadLink = document.getElementById('download-link');
                downloadLink.href = currentBlobUrl;
                downloadLink.download = `timer_${duration}s_${currentStyle}.gif`;
                downloadSection.classList.remove('hidden');

                const sizeKB = (blob.size / 1024).toFixed(1);
                document.getElementById('file-info').textContent = `${sizeKB} KB`;
            } catch (err) {
                alert('Error generating timer: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Timer GIF';
                btn.classList.remove('opacity-50');
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
